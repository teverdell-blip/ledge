<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ledge" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Ledge – Finance Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #0f172a; font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    select option { background: #1e293b; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    @keyframes ldp { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .dot-1 { animation: ldp 1.2s ease-in-out 0s infinite; }
    .dot-2 { animation: ldp 1.2s ease-in-out 0.2s infinite; }
    .dot-3 { animation: ldp 1.2s ease-in-out 0.4s infinite; }
    button { font-family: inherit; }
    input, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6EE7C0;font-size:14px;">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
  (function() {
    const PROXY_URL   = "https://ledge-proxy.teverdell-blip.workers.dev";
    const STORAGE_KEY = "ledge_txns_v1";

    const CATEGORIES = {
      income:  ["Salary","Freelance","Investment","Other Income"],
      expense: ["Housing","Food","Transport","Health","Entertainment","Utilities","Shopping","Other"],
    };
    const ALL_CATS = [...CATEGORIES.income, ...CATEGORIES.expense];
    const CAT_COLORS = {
      Salary:"#6EE7C0",Freelance:"#93C5FD",Investment:"#FCA5A5","Other Income":"#C4B5FD",
      Housing:"#F97316",Food:"#EAB308",Transport:"#3B82F6",Health:"#10B981",
      Entertainment:"#8B5CF6",Utilities:"#6B7280",Shopping:"#EC4899",Other:"#9CA3AF",
    };
    const SEED = [
      {id:1,date:"2026-06-01",type:"income", category:"Salary",       desc:"June payroll",   amount:5800},
      {id:2,date:"2026-06-03",type:"expense",category:"Housing",      desc:"Rent",           amount:2100},
      {id:3,date:"2026-06-05",type:"expense",category:"Food",         desc:"Groceries",      amount:210},
      {id:4,date:"2026-06-07",type:"expense",category:"Transport",    desc:"Fuel",           amount:95},
      {id:5,date:"2026-06-10",type:"income", category:"Freelance",    desc:"Consulting gig", amount:1200},
      {id:6,date:"2026-06-12",type:"expense",category:"Entertainment",desc:"Streaming subs", amount:45},
      {id:7,date:"2026-06-14",type:"expense",category:"Health",       desc:"Physio",         amount:120},
      {id:8,date:"2026-06-18",type:"expense",category:"Shopping",     desc:"Baby gear",      amount:340},
    ];
    const PROMPTS = [
      "Where am I spending the most?",
      "How's my savings rate?",
      "Any spending I should cut back on?",
      "What's my biggest expense this month?",
    ];

    // ── state ─────────────────────────────────────────────────────────────────
    function todayStr() { return new Date().toISOString().split("T")[0]; }
    function loadTxns() {
      try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
      return SEED.map(t=>Object.assign({},t));
    }
    function saveTxns(t) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(t)); } catch(e){} }
    function loadStartingBalance() { try { var v=localStorage.getItem("ledge_balance_v1"); return v!==null?parseFloat(v):0; } catch(e){return 0;} }
    function saveStartingBalance(v) { try { localStorage.setItem("ledge_balance_v1",String(v)); } catch(e){} }

    function getMonthRange() {
      var now=new Date(), y=now.getFullYear(), m=now.getMonth();
      var start=y+"-"+String(m+1).padStart(2,"0")+"-01";
      var end=new Date(y,m+1,0); // last day of month
      return {start:start, end:y+"-"+String(m+1).padStart(2,"0")+"-"+String(end.getDate()).padStart(2,"0"), label:now.toLocaleString("en-AU",{month:"long",year:"numeric"})};
    }
    function getFYRange() {
      var now=new Date(), y=now.getFullYear(), m=now.getMonth();
      // Australian FY: 1 Jul – 30 Jun
      var fyStart = m>=6 ? y : y-1;
      return {start:fyStart+"-07-01", end:(fyStart+1)+"-06-30", label:"FY "+fyStart+"–"+(fyStart+1)};
    }
    function filterByPeriod(txns, period) {
      if (period==="all") return txns;
      var range = period==="month" ? getMonthRange() : getFYRange();
      return txns.filter(function(t){ return t.date>=range.start && t.date<=range.end; });
    }
    function periodLabel(period) {
      if (period==="month") return getMonthRange().label;
      if (period==="fy") return getFYRange().label;
      return "All time";
    }
    function fmt(n) { return new Intl.NumberFormat("en-AU",{style:"currency",currency:"AUD",minimumFractionDigits:0}).format(n); }

    var S = {
      view:"dashboard", filter:"all",
      txns: loadTxns(), nextId:1000,
      formDate:todayStr(), formType:"expense", formCat:"Food", formDesc:"", formAmt:"",
      editId:null, editDate:"", editType:"expense", editCat:"Food", editDesc:"", editAmt:"",
      dashPeriod:"month",
      startingBalance:loadStartingBalance(), editingBalance:false, balanceInput:"",
      messages:[{role:"assistant",text:"Hi! I can see all your transactions. Ask me anything about your finances — spending patterns, savings tips, or where your money's going."}],
      chatInput:"", aiLoading:false, aiError:"",
      importStage:"idle", importRows:[], importEdits:{}, importError:"", importMode:"append",
    };

    function set(patch) { Object.assign(S,patch); render(); }
    function setTxns(t) { saveTxns(t); set({txns:t}); }

    // ── import helpers ────────────────────────────────────────────────────────
    function normaliseDate(raw) {
      if (!raw) return todayStr();
      if (typeof raw==="number") { var d=XLSX.SSF.parse_date_code(raw); if(d) return d.y+"-"+String(d.m).padStart(2,"0")+"-"+String(d.d).padStart(2,"0"); }
      var s=String(raw).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      var dmy=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
      if (dmy) return dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0");
      var p=new Date(s); if(!isNaN(p)) return p.toISOString().split("T")[0];
      return todayStr();
    }
    function guessCategory(desc) {
      var d=(desc||"").toLowerCase();
      if (/rent|mortgage|council|strata/.test(d)) return "Housing";
      if (/grocer|supermarket|coles|woolworth|aldi|iga|food|cafe|restaurant|takeaway|pizza|mcdonald|kfc/.test(d)) return "Food";
      if (/fuel|petrol|uber|taxi|bus|train|toll|parking|car|transport/.test(d)) return "Transport";
      if (/gym|pharmacy|doctor|hospital|medical|health|physio|dental/.test(d)) return "Health";
      if (/netflix|spotify|steam|cinema|entertainment|ticketek|concert/.test(d)) return "Entertainment";
      if (/electric|gas|water|internet|phone|telstra|optus|utilities/.test(d)) return "Utilities";
      if (/salary|payroll|wage/.test(d)) return "Salary";
      if (/freelance|consult|invoice/.test(d)) return "Freelance";
      return "Other";
    }
    function findCol(headers,candidates) {
      for (var i=0;i<candidates.length;i++) {
        var c=candidates[i];
        var found=headers.find(function(h){return h&&h.toLowerCase().replace(/[\s_\-]/g,"").indexOf(c.replace(/[\s_\-]/g,""))>=0;});
        if (found) return found;
      }
      return null;
    }
    function parseRows(rawRows) {
      if (!rawRows.length) return [];
      var headers=Object.keys(rawRows[0]);

      var dateCol  = findCol(headers,["effectivedate","date","txndate","transactiondate","when"]);
      var descCol  = findCol(headers,["description","desc","longdescription","details","memo","narrative","payee","merchant"]);
      var catCol   = findCol(headers,["category","cat","classification"]);
      var typeCol  = findCol(headers,["transactiontype","type","txntype","direction"]);

      // Detect separate debit/credit columns vs single amount column
      var debitCol  = findCol(headers,["debitamount","debit"]);
      var creditCol = findCol(headers,["creditamount","credit"]);
      var amtCol    = (!debitCol && !creditCol) ? findCol(headers,["amount","amt","value","sum"]) : null;

      var results=[];
      rawRows.forEach(function(r,i){
        var desc=descCol?String(r[descCol]||"").trim():"";
        var category=catCol?String(r[catCol]||"").trim():"";
        if (ALL_CATS.indexOf(category)<0) category=guessCategory(desc);
        var date=normaliseDate(dateCol?r[dateCol]:"");

        if (debitCol || creditCol) {
          // Separate debit/credit columns — emit one row per non-empty value
          var debit  = parseFloat(String(r[debitCol] ||"0").replace(/[^0-9.\-]/g,""));
          var credit = parseFloat(String(r[creditCol]||"0").replace(/[^0-9.\-]/g,""));

          if (!isNaN(debit) && debit > 0) {
            var dCat = catCol && ALL_CATS.indexOf(String(r[catCol]||"").trim())>=0 ? String(r[catCol]).trim() : guessCategory(desc);
            results.push({id:Date.now()+i*2, date:date, amount:debit,  type:"expense", category:dCat, desc:desc||"Imported transaction"});
          }
          if (!isNaN(credit) && credit > 0) {
            var cCat = catCol && ALL_CATS.indexOf(String(r[catCol]||"").trim())>=0 ? String(r[catCol]).trim() : guessCategory(desc);
            // Credits are most likely income unless description suggests otherwise
            var cType = CATEGORIES.income.indexOf(cCat)>=0 ? "income" : "income";
            results.push({id:Date.now()+i*2+1, date:date, amount:credit, type:"income",  category:cCat==="Other"?"Other Income":cCat, desc:desc||"Imported transaction"});
          }
        } else if (amtCol) {
          // Single amount column
          var rawAmt=parseFloat(String(r[amtCol]||"0").replace(/[^0-9.\-]/g,""));
          if (isNaN(rawAmt)||rawAmt===0) return;
          var amount=Math.abs(rawAmt);
          var type=typeCol?String(r[typeCol]||"").toLowerCase():"";
          if (type!=="income"&&type!=="expense") type=rawAmt<0?"expense":(CATEGORIES.income.indexOf(category)>=0?"income":"expense");
          results.push({id:Date.now()+i, date:date, amount:amount, type:type, category:category, desc:desc||"Imported transaction"});
        }
      });
      return results;
    }

    // ── derived ───────────────────────────────────────────────────────────────
    function getSorted() { return S.txns.slice().sort(function(a,b){return b.date.localeCompare(a.date);}); }
    function getIncome()   { return S.txns.filter(function(t){return t.type==="income";}).reduce(function(s,t){return s+t.amount;},0); }
    function getExpenses() { return S.txns.filter(function(t){return t.type==="expense";}).reduce(function(s,t){return s+t.amount;},0); }
    function getCats() {
      var map={};
      S.txns.filter(function(t){return t.type==="expense";}).forEach(function(t){map[t.category]=(map[t.category]||0)+t.amount;});
      return Object.keys(map).map(function(k){return {label:k,value:map[k],color:CAT_COLORS[k]||"#6B7280"};}).sort(function(a,b){return b.value-a.value;});
    }
    function getSpark() {
      var days=[];
      for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-(6-i));days.push(d.toISOString().split("T")[0]);}
      return days.map(function(d){return S.txns.filter(function(t){return t.date===d&&t.type==="expense";}).reduce(function(s,t){return s+t.amount;},0);});
    }
    function getImportRow(idx) { return Object.assign({},S.importRows[idx],S.importEdits[idx]||{}); }

    // ── svg ───────────────────────────────────────────────────────────────────
    function donutSVG(slices,size) {
      size=size||120;
      var total=slices.reduce(function(s,x){return s+x.value;},0); if(!total) return "";
      var cum=0,paths="";
      slices.forEach(function(sl){
        var start=(cum/total)*360; cum+=sl.value; var end=(cum/total)*360;
        var r=size/2-14,cx=size/2,cy=size/2;
        function toRad(d){return((d-90)*Math.PI)/180;}
        var x1=cx+r*Math.cos(toRad(start)),y1=cy+r*Math.sin(toRad(start));
        var x2=cx+r*Math.cos(toRad(end)),  y2=cy+r*Math.sin(toRad(end));
        paths+='<path d="M '+cx+' '+cy+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+(end-start>180?1:0)+' 1 '+x2+' '+y2+' Z" fill="'+sl.color+'" opacity="0.9"/>';
      });
      return '<svg width="'+size+'" height="'+size+'">'+paths+'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+(size/2-28)+'" fill="#0f172a"/></svg>';
    }

    // ── html helpers ──────────────────────────────────────────────────────────
    function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function lbl(t) { return '<div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#64748b;margin-bottom:4px">'+t+'</div>'; }
    function card(inner,extra) { return '<div style="background:#1e293b;border-radius:16px;padding:18px 20px;margin-bottom:14px'+(extra||"")+'">'+inner+'</div>'; }

    // ── actions ───────────────────────────────────────────────────────────────
    function addTxn() {
      if (!S.formDesc||!S.formAmt||isNaN(+S.formAmt)) return;
      var newTxns=S.txns.concat([{id:S.nextId,date:S.formDate,type:S.formType,category:S.formCat,desc:S.formDesc,amount:parseFloat(S.formAmt)}]);
      saveTxns(newTxns);
      set({txns:newTxns,nextId:S.nextId+1,formDate:todayStr(),formType:"expense",formCat:"Food",formDesc:"",formAmt:"",view:"transactions"});
    }
    function deleteTxn(id) { setTxns(S.txns.filter(function(t){return t.id!==id;})); }
    function startEdit(id) {
      var t=S.txns.find(function(t){return t.id===id;}); if(!t) return;
      set({editId:id,editDate:t.date,editType:t.type,editCat:t.category,editDesc:t.desc,editAmt:String(t.amount)});
    }
    function saveEdit() {
      if (!S.editDesc||!S.editAmt||isNaN(+S.editAmt)) return;
      var newTxns=S.txns.map(function(t){
        if (t.id!==S.editId) return t;
        return {id:t.id,date:S.editDate,type:S.editType,category:S.editCat,desc:S.editDesc,amount:parseFloat(S.editAmt)};
      });
      saveTxns(newTxns);
      set({txns:newTxns,editId:null});
    }
    function cancelEdit() { set({editId:null}); }
    function saveBalance() {
      var v=parseFloat(S.balanceInput);
      if (isNaN(v)) v=0;
      saveStartingBalance(v);
      set({startingBalance:v,editingBalance:false,balanceInput:""});
    }
    function confirmImport() {
      var finalRows=S.importRows.map(function(_,i){var r=getImportRow(i);return {id:Date.now()+i,date:r.date,type:r.type,category:r.category,desc:r.desc,amount:r.amount};});
      var newTxns=S.importMode==="replace"?finalRows:S.txns.concat(finalRows);
      saveTxns(newTxns);
      set({txns:newTxns,importStage:"done",importRows:[],importEdits:{}});
    }
    function resetImport() { set({importStage:"idle",importRows:[],importEdits:{},importError:""}); }

    function buildSummary() {
      var income=getIncome(),expenses=getExpenses(),net=income-expenses;
      var map={};
      S.txns.filter(function(t){return t.type==="expense";}).forEach(function(t){map[t.category]=(map[t.category]||0)+t.amount;});
      var catLines=Object.keys(map).sort(function(a,b){return map[b]-map[a];}).map(function(k){return "  "+k+": "+fmt(map[k]);}).join("\n");
      var sorted=getSorted();
      return "Financial Data (AUD):\n- Income: "+fmt(income)+"  Expenses: "+fmt(expenses)+"  Net: "+fmt(net)+"\n- Savings rate: "+(income>0?Math.round((net/income)*100):0)+"%\nExpense breakdown:\n"+catLines+"\nAll transactions:\n"+sorted.map(function(t){return "  ["+t.date+"] "+(t.type==="income"?"+":"-")+fmt(t.amount)+" \u2014 "+t.desc+" ("+t.category+")";}).join("\n");
    }

    async function sendMessage(text) {
      var userText=text||S.chatInput.trim(); if(!userText||S.aiLoading) return;
      var newMsgs=S.messages.concat([{role:"user",text:userText}]);
      set({messages:newMsgs,chatInput:"",aiLoading:true,aiError:""});
      try {
        var res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({system:"You are a friendly personal finance advisor. Be concise, specific, use AUD, reference their actual numbers. 2\u20134 sentences unless a breakdown helps.\n\n"+buildSummary(),
            messages:newMsgs.map(function(m){return {role:m.role==="assistant"?"assistant":"user",content:m.text};})})});
        if (!res.ok) { var e=await res.json().catch(function(){return {};}); throw new Error(e.error||"HTTP "+res.status); }
        var data=await res.json();
        set({messages:newMsgs.concat([{role:"assistant",text:data.text||"No response."}]),aiLoading:false});
      } catch(err) {
        set({messages:newMsgs.concat([{role:"assistant",text:"Sorry, couldn't reach the server. Check your connection."}]),aiLoading:false,aiError:err.message||"Error"});
      }
    }

    // ── event delegation ──────────────────────────────────────────────────────
    document.addEventListener("click", function(e) {
      var el=e.target;
      // walk up to find data-action
      while (el && el !== document.body) {
        var action=el.getAttribute("data-action");
        if (action) {
          e.preventDefault();
          handleAction(action, el);
          return;
        }
        el=el.parentElement;
      }
    });

    document.addEventListener("change", function(e) {
      var el=e.target;
      var field=el.getAttribute("data-field");
      var idx=el.getAttribute("data-idx");
      if (field && idx!==null) {
        var val=el.value;
        var edits=Object.assign({},S.importEdits);
        edits[idx]=Object.assign({},edits[idx]||{});
        edits[idx][field]=field==="amount"?parseFloat(val)||0:val;
        set({importEdits:edits});
        return;
      }
      // form fields
      if (el.id==="form-date")  { set({formDate:el.value}); return; }
      if (el.id==="form-cat")   { set({formCat:el.value}); return; }
      if (el.id==="form-type")  { set({formType:el.value,formCat:el.value==="income"?"Salary":"Food"}); return; }
      if (el.id==="edit-date")  { set({editDate:el.value}); return; }
      if (el.id==="edit-cat")   { set({editCat:el.value}); return; }
      if (el.id==="edit-type")  { set({editType:el.value,editCat:el.value==="income"?"Salary":"Food"}); return; }
      if (el.id==="chat-input") { S.chatInput=el.value; return; }
    });

    document.addEventListener("input", function(e) {
      var el=e.target;
      if (el.id==="form-desc") { S.formDesc=el.value; return; }
      if (el.id==="form-amt")  { S.formAmt=el.value; return; }
      if (el.id==="edit-desc")    { S.editDesc=el.value; return; }
      if (el.id==="edit-amt")     { S.editAmt=el.value; return; }
      if (el.id==="balance-input"){ S.balanceInput=el.value; return; }
      if (el.id==="chat-input"){ S.chatInput=el.value; return; }
    });

    document.addEventListener("keydown", function(e) {
      if (e.target.id==="chat-input" && e.key==="Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(null);
      }
    });

    document.addEventListener("change", function(e) {
      if (e.target.id==="file-input") {
        var file=e.target.files[0]; if(!file) return;
        set({importError:""});
        var reader=new FileReader();
        reader.onload=function(ev){
          try {
            var data=new Uint8Array(ev.target.result);
            var wb=XLSX.read(data,{type:"array",cellDates:false});
            var ws=wb.Sheets[wb.SheetNames[0]];
            var raw=XLSX.utils.sheet_to_json(ws,{defval:""});
            if (!raw.length){set({importError:"No data rows found."});return;}
            var parsed=parseRows(raw);
            if (!parsed.length){set({importError:"Couldn't find an amount column."});return;}
            set({importRows:parsed,importEdits:{},importStage:"preview"});
          } catch(err){set({importError:"Couldn't read that file."});}
        };
        reader.readAsArrayBuffer(file);
        e.target.value="";
      }
    });

    function handleAction(action, el) {
      if (action==="nav")          { set({view:el.getAttribute("data-view")}); return; }
      if (action==="filter")       { set({filter:el.getAttribute("data-val")}); return; }
      if (action==="import-mode")  { set({importMode:el.getAttribute("data-val")}); return; }
      if (action==="add-txn")      { addTxn(); return; }
      if (action==="cancel-add")   { set({view:"dashboard"}); return; }
      if (action==="confirm-import"){confirmImport(); return; }
      if (action==="cancel-import"){ resetImport(); return; }
      if (action==="reset-import") { resetImport(); return; }
      if (action==="import-done")  { set({view:"dashboard"}); return; }
      if (action==="send-chat")    { sendMessage(null); return; }
      if (action==="prompt")       { sendMessage(el.getAttribute("data-val")); return; }
      if (action==="delete-txn")   { deleteTxn(parseInt(el.getAttribute("data-id"))); return; }
      if (action==="edit-txn")     { startEdit(parseInt(el.getAttribute("data-id"))); return; }
      if (action==="save-edit")    { saveEdit(); return; }
      if (action==="cancel-edit")  { cancelEdit(); return; }
      if (action==="edit-type")    { set({editType:el.getAttribute("data-val"),editCat:el.getAttribute("data-val")==="income"?"Salary":"Food"}); return; }
      if (action==="open-file")       { document.getElementById("file-input").click(); return; }
      if (action==="set-period")       { set({dashPeriod:el.getAttribute("data-val")}); return; }
      if (action==="edit-balance")     { set({editingBalance:true,balanceInput:String(S.startingBalance)}); return; }
      if (action==="save-balance")     { saveBalance(); return; }
      if (action==="cancel-balance")   { set({editingBalance:false,balanceInput:""}); return; }
    }

    // ── render ────────────────────────────────────────────────────────────────
    function render() {
      var sorted=getSorted();
      var spark=getSpark(), sparkMax=Math.max.apply(null,spark.concat([1]));

      var NAV=[
        {id:"dashboard",label:"Overview",col:"#6EE7C0"},
        {id:"transactions",label:"Transactions",col:"#6EE7C0"},
        {id:"add",label:"+ Add",col:"#6EE7C0"},
        {id:"import",label:"&#8593; Import",col:"#38bdf8"},
        {id:"ask",label:"&#10022; Ask",col:"#a78bfa"},

      var bodyHTML="";

      // DASHBOARD
      if (S.view==="dashboard") {
        // period-filtered data
        var pTxns=filterByPeriod(S.txns,S.dashPeriod);
        var pIncome=pTxns.filter(function(t){return t.type==="income";}).reduce(function(s,t){return s+t.amount;},0);
        var pExpenses=pTxns.filter(function(t){return t.type==="expense";}).reduce(function(s,t){return s+t.amount;},0);
        var pNet=pIncome-pExpenses;
        // current balance = starting balance + all-time net
        var allNet=getIncome()-getExpenses();
        var currentBalance=S.startingBalance+allNet;

        // period toggle buttons
        var periods=[["month","This month"],["fy","This FY"],["all","All time"]];
        var periodBtns=periods.map(function(p){var a=S.dashPeriod===p[0];return '<button data-action="set-period" data-val="'+p[0]+'" style="flex:1;padding:6px 4px;border-radius:8px;border:none;background:'+(a?"#6EE7C022":"none")+';color:'+(a?"#6EE7C0":"#64748b")+';font-size:11px;font-weight:'+(a?"700":"500")+';cursor:pointer">'+p[1]+'</button>';}).join("");
        var periodLabel2=S.dashPeriod==="month"?getMonthRange().label:S.dashPeriod==="fy"?getFYRange().label:"All time";

        var sparkBars=spark.map(function(v,i){return '<div style="flex:1;height:'+Math.max(8,(v/sparkMax)*36)+'px;background:'+(i===spark.length-1?"#6EE7C0":"#1e293b")+';border-radius:3px"></div>';}).join("");

        // cats from period
        var pCatMap={};
        pTxns.filter(function(t){return t.type==="expense";}).forEach(function(t){pCatMap[t.category]=(pCatMap[t.category]||0)+t.amount;});
        var pCats=Object.keys(pCatMap).map(function(k){return {label:k,value:pCatMap[k],color:CAT_COLORS[k]||"#6B7280"};}).sort(function(a,b){return b.value-a.value;});
        var catRows=pCats.slice(0,5).map(function(c){return '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:7px"><div style="width:10px;height:10px;border-radius:50%;background:'+c.color+';flex-shrink:0"></div><span style="font-size:12px;color:#94a3b8">'+esc(c.label)+'</span></div><span style="font-size:12px;font-weight:700;color:#e2e8f0">'+fmt(c.value)+'</span></div>';}).join("");

        var recentRows=sorted.slice(0,4).map(function(t){return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #1e293b"><div style="width:10px;height:10px;border-radius:50%;background:'+(CAT_COLORS[t.category]||"#6B7280")+';flex-shrink:0"></div><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#f1f5f9">'+esc(t.desc)+'</div><div style="font-size:11px;color:#64748b">'+esc(t.category)+' · '+t.date+'</div></div><div style="font-size:15px;font-weight:700;color:'+(t.type==="income"?"#6EE7C0":"#F87171")+'">'+(t.type==="income"?"+":"-")+fmt(t.amount)+'</div></div>';}).join("");

        // starting balance card
        var balanceCard;
        if (S.editingBalance) {
          balanceCard=card(
            lbl("Starting balance")+
            '<div style="font-size:12px;color:#475569;margin-bottom:10px">Your account balance before you started tracking. Used to calculate your current balance.</div>'+
            '<input id="balance-input" type="number" value="'+esc(S.balanceInput)+'" step="0.01" placeholder="e.g. 5000" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:10px 12px;font-size:15px;outline:none;margin-bottom:10px">'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
              '<button data-action="save-balance" style="padding:10px;border-radius:10px;border:none;background:#6EE7C0;color:#0f172a;font-weight:700;font-size:14px;cursor:pointer">Save</button>'+
              '<button data-action="cancel-balance" style="padding:10px;border-radius:10px;border:none;background:#334155;color:#94a3b8;font-weight:700;font-size:14px;cursor:pointer">Cancel</button>'+
            '</div>'
          );
        } else {
          balanceCard=card(
            '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
              '<div>'+lbl("Current balance")+
                '<div style="font-size:28px;font-weight:800;letter-spacing:-0.03em;color:'+(currentBalance>=0?"#6EE7C0":"#F87171")+'">'+fmt(currentBalance)+'</div>'+
                '<div style="font-size:11px;color:#475569;margin-top:3px">Starting balance '+fmt(S.startingBalance)+' + all-time net '+fmt(allNet)+'</div>'+

          '<div style="background:#1e293b;border-radius:12px;padding:6px;display:flex;gap:2px;margin-bottom:14px">'+periodBtns+'</div>'+

          balanceCard+

            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+

              '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+

            '</div>';

              '<div style="display:flex;gap:6px;margin-top:2px"><span style="display:inline-block;background:'+(CAT_COLORS[t.category]||"#6B7280")+'22;color:'+(CAT_COLORS[t.category]||"#6B7280")+';border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+esc(t.category)+'</span><span style="font-size:11px;color:#475569">'+t.date+'</span></div>'+
            '</div>'+
            '<div style="text-align:right">'+
              '<div style="font-size:15px;font-weight:700;color:'+(t.type==="income"?"#6EE7C0":"#F87171")+'">'+(t.type==="income"?"+":"-")+fmt(t.amount)+'</div>'+
              '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:3px">'+
                '<button data-action="edit-txn" data-id="'+t.id+'" style="background:none;border:none;color:#38bdf8;cursor:pointer;font-size:12px;padding:0">edit</button>'+
                '<button data-action="delete-txn" data-id="'+t.id+'" style="background:none;border:none;color:#334155;cursor:pointer;font-size:12px;padding:0">delete</button>'+
              '</div>'+
            '</div>'+
          '</div>';
        }).join("");
        bodyHTML='<div style="display:flex;gap:8px;margin-bottom:16px">'+chips+'</div>'+(rows||'<div style="text-align:center;color:#475569;padding-top:48px;font-size:14px">No transactions yet. Add one →</div>');
      }

      // ADD
      else if (S.view==="add") {
        var typeBtns=["expense","income"].map(function(t){var a=S.formType===t;return '<button data-action="form-type" data-val="'+t+'" style="padding:12px;border-radius:12px;border:2px solid '+(a?(t==="income"?"#6EE7C0":"#F87171"):"#334155")+';background:'+(a?(t==="income"?"#6EE7C022":"#F8717122"):"#1e293b")+';color:'+(a?(t==="income"?"#6EE7C0":"#F87171"):"#64748b")+';font-weight:700;font-size:14px;cursor:pointer;text-transform:capitalize">'+t+'</button>';}).join("");
        var catOpts=CATEGORIES[S.formType].map(function(c){return '<option value="'+esc(c)+'"'+(c===S.formCat?" selected":"")+'>'+esc(c)+'</option>';}).join("");
        bodyHTML=
          lbl("Log a transaction")+
          '<div style="margin-bottom:14px"></div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'+typeBtns+'</div>'+
          '<input id="form-date" type="date" value="'+S.formDate+'" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#f1f5f9;padding:12px 14px;font-size:15px;margin-bottom:12px;outline:none">'+
          '<select id="form-cat" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#f1f5f9;padding:12px 14px;font-size:15px;margin-bottom:12px;outline:none">'+catOpts+'</select>'+
          '<input id="form-desc" type="text" placeholder="Description" value="'+esc(S.formDesc)+'" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#f1f5f9;padding:12px 14px;font-size:15px;margin-bottom:12px;outline:none">'+
          '<input id="form-amt" type="number" placeholder="Amount (AUD)" value="'+esc(S.formAmt)+'" min="0" step="0.01" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#f1f5f9;padding:12px 14px;font-size:15px;margin-bottom:12px;outline:none">'+
          '<button data-action="add-txn" style="width:100%;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;background:#6EE7C0;color:#0f172a;margin-bottom:10px">Save transaction</button>'+
          '<button data-action="cancel-add" style="width:100%;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;background:#1e293b;color:#94a3b8;margin-bottom:10px">Cancel</button>';

        // handle type button click separately since it's not a nav
        document.addEventListener("click",function typeHandler(e){
          var el=e.target;
          while(el&&el!==document.body){
            if(el.getAttribute("data-action")==="form-type"){
              var val=el.getAttribute("data-val");
              set({formType:val,formCat:val==="income"?"Salary":"Food"});
              document.removeEventListener("click",typeHandler);
              return;
            }
            el=el.parentElement;
          }
        });
      }

      // IMPORT
      else if (S.view==="import") {
        if (S.importStage==="idle") {
          var modeBtns=[["append","Add to existing"],["replace","Replace all"]].map(function(m){var a=S.importMode===m[0];return '<button data-action="import-mode" data-val="'+m[0]+'" style="padding:12px;border-radius:12px;border:2px solid '+(a?"#38bdf8":"#334155")+';background:'+(a?"#0c2a3a":"#1e293b")+';color:'+(a?"#38bdf8":"#64748b")+';font-weight:700;font-size:13px;cursor:pointer">'+m[1]+'</button>';}).join("");
          bodyHTML=
            '<div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#38bdf8;margin-bottom:4px">Import transactions</div>'+
            '<div style="font-size:12px;color:#475569;margin-bottom:20px">Accepts .xlsx, .xls, or .csv</div>'+
            '<input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none">'+
            '<div data-action="open-file" style="border:2px dashed #334155;border-radius:16px;padding:40px 24px;text-align:center;cursor:pointer;margin-bottom:16px"><div style="font-size:32px;margin-bottom:10px">&#128194;</div><div style="font-weight:700;color:#e2e8f0;margin-bottom:6px">Tap to choose a file</div><div style="font-size:12px;color:#475569">or drag and drop here</div></div>'+
            (S.importError?'<div style="background:#2d0f0f;border:1px solid #F87171;border-radius:12px;padding:12px 16px;color:#F87171;font-size:13px;margin-bottom:16px">'+esc(S.importError)+'</div>':"")+
            card(lbl("Expected columns")+'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+["date","amount","description","category","type"].map(function(c){return '<span style="background:#0f172a;border-radius:6px;padding:3px 10px;font-size:11px;color:#38bdf8;font-family:monospace">'+c+'</span>';}).join("")+'</div><div style="font-size:12px;color:#475569;line-height:1.7">Column names are flexible. Missing category/type columns are auto-guessed. ANZ, CBA, NAB, and Westpac CSV exports typically work out of the box.</div>')+

            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+modeBtns+'</div>';
        } else if (S.importStage==="preview") {
          var rowsHTML=S.importRows.map(function(_,idx){
            var r=getImportRow(idx);
            var catOpts2=ALL_CATS.map(function(c){return '<option value="'+esc(c)+'"'+(c===r.category?" selected":"")+'>'+esc(c)+'</option>';}).join("");

              '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+

            '<button data-action="cancel-import" style="width:100%;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;background:#1e293b;color:#94a3b8;margin-bottom:10px">Cancel</button>';
        } else {
          bodyHTML='<div style="text-align:center;padding-top:40px"><div style="font-size:48px;margin-bottom:16px">\u2713</div><div style="font-weight:800;font-size:20px;color:#e2e8f0;margin-bottom:8px">Import complete</div><div style="font-size:14px;color:#64748b;margin-bottom:32px">Your transactions have been updated.</div><button data-action="import-done" style="padding:12px 28px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;background:#38bdf8;color:#0f172a">Go to overview</button></div>';
        }
      }

      // ASK
      else if (S.view==="ask") {
        var hasUserMsg=S.messages.filter(function(m){return m.role==="user";}).length>0;
        var promptBtns=!hasUserMsg?'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">'+PROMPTS.map(function(p){return '<button data-action="prompt" data-val="'+esc(p)+'" style="background:#1e1b2e;border:1px solid #4c1d9522;border-radius:20px;color:#a78bfa;font-size:12px;padding:7px 13px;cursor:pointer;font-weight:500">'+esc(p)+'</button>';}).join("")+'</div>':"";
        var msgHTML=S.messages.map(function(m){var u=m.role==="user";return '<div style="display:flex;justify-content:'+(u?"flex-end":"flex-start")+'"><div style="max-width:82%;padding:11px 14px;border-radius:'+(u?"18px 18px 4px 18px":"18px 18px 18px 4px")+';background:'+(u?"#4c1d95":"#1e293b")+';color:'+(u?"#ede9fe":"#e2e8f0")+';font-size:14px;line-height:1.55;white-space:pre-wrap">'+esc(m.text)+'</div></div>';}).join("");
        var dots=S.aiLoading?'<div style="display:flex;justify-content:flex-start"><div style="background:#1e293b;border-radius:18px 18px 18px 4px;padding:11px 16px"><div style="display:flex;gap:4px;align-items:center"><div class="dot-1" style="width:6px;height:6px;border-radius:50%;background:#6EE7C0"></div><div class="dot-2" style="width:6px;height:6px;border-radius:50%;background:#6EE7C0"></div><div class="dot-3" style="width:6px;height:6px;border-radius:50%;background:#6EE7C0"></div></div></div></div>':"";
        bodyHTML=
          '<div style="display:flex;flex-direction:column;height:calc(100vh - 160px)">'+
            '<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#a78bfa;margin-bottom:4px">AI Finance Advisor</div><div style="font-size:12px;color:#475569">Powered by Claude \xb7 end-to-end via secure proxy</div></div>'+
            promptBtns+
            (S.aiError?'<div style="background:#2d0f0f;border:1px solid #F87171;border-radius:10px;padding:10px 14px;color:#F87171;font-size:12px;margin-bottom:12px">'+esc(S.aiError)+'</div>':"")+
            '<div id="chat-messages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:12px">'+msgHTML+dots+'</div>'+
            '<div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid #1e293b">'+
              '<input id="chat-input" placeholder="Ask about your finances\u2026" value="'+esc(S.chatInput)+'" style="flex:1;background:#1e293b;border:1px solid #2d1f5e;border-radius:10px;color:#f1f5f9;padding:12px 14px;font-size:14px;outline:none;box-sizing:border-box">'+
              '<button data-action="send-chat" '+(S.aiLoading?"disabled":"")+' style="padding:12px 16px;border-radius:10px;border:none;background:'+(S.aiLoading?"#1e293b":"#a78bfa")+';color:'+(S.aiLoading?"#475569":"#0f172a")+';font-weight:700;font-size:15px;cursor:'+(S.aiLoading?"default":"pointer")+'">\u2191</button>'+
            '</div>'+
          '</div>';
        setTimeout(function(){var el=document.getElementById("chat-messages");if(el)el.scrollTop=el.scrollHeight;},50);
      }

      document.getElementById("root").innerHTML=
        '<div style="background:#0f172a;min-height:100vh;max-width:480px;margin:0 auto">'+
          '<div style="padding:env(safe-area-inset-top,20px) 24px 0;background:#0f172a;position:sticky;top:0;z-index:10">'+
            '<div style="font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#6EE7C0;margin-bottom:2px;padding-top:8px">Ledge</div>'+
            '<div style="font-size:22px;font-weight:800;color:#f8fafc;letter-spacing:-0.03em;margin-bottom:20px">Your money, clear.</div>'+
            '<div style="display:flex;border-bottom:1px solid #1e293b">'+navHTML+'</div>'+
          '</div>'+
          '<div style="padding:20px 24px 100px">'+bodyHTML+'</div>'+
        '</div>';
    }

    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load",function(){
        navigator.serviceWorker.register("/ledge/sw.js").catch(function(e){console.warn("SW failed:",e);});
      });
    }
  })();
  </script>
</body>
</html>
